"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

add_newline = true
palette = 'catppuccin_mocha'

[directory]
style = "lavender"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
style = "mauve"
format = "[ $symbol$branch ]($style)"
symbol = " "

[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style) )'

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[line_break]
disabled = false

# disable everything else
[cmd_duration]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

[os]
disabled = true

[time]
disabled = true

[conda]
disabled = true

[python]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

